services:
  postgres:
    image: postgres:17-alpine
    container_name: rails-101-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: maibok
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rails_101
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
